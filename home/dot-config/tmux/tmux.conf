# ╔══════════════════════════════════════════════════════════════════════╗
# ║  tmux.conf — clean modern setup with sesh + catppuccin              ║
# ║  prefix: Shift+Space  │  ALL bindings prefix-based (no conflicts)   ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── Terminal ──────────────────────────────────────────────────────────
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g  allow-passthrough on            # Ghostty image protocol, etc.
set -as terminal-features ',xterm-ghostty:hyperlinks'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'           # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Core ──────────────────────────────────────────────────────────────
set  -g mouse on
set  -g base-index 1                    # windows start at 1
setw -g pane-base-index 1              # panes start at 1
set  -g renumber-windows on            # no gaps after closing windows
setw -g automatic-rename off
set  -g set-clipboard on
set  -g history-limit 50000
set  -g escape-time 0                  # instant Esc (critical for vim)
set  -g repeat-time 600               # ms to repeat without prefix
set  -g focus-events on
set  -g status-position top
set  -g detach-on-destroy off          # ★ switch session on kill, don't detach!
setw -g aggressive-resize on

# ── Prefix (Shift+Space) ───────────────────────────────────────
# Shift+Space as prefix:
# Ghostty keybind sends ESC+Space (M-Space) for Shift+Space
# escape-time 15ms lets tmux read ESC+Space as M-Space (imperceptible)
unbind C-b
set -g extended-keys always
set -g extended-keys-format csi-u
set -g prefix M-Space
bind M-Space send-prefix

# ── Splits ────────────────────────────────────────────────────────────
bind \\ split-window -h  -c "#{pane_current_path}"   # prefix+\  → vertical
bind |  split-window -h  -c "#{pane_current_path}"   # prefix+|  → vertical (alt)
bind -  split-window -v  -c "#{pane_current_path}"   # prefix+-  → horizontal

# ── Pane navigation (prefix + vim keys) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing (repeatable) ────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ───────────────────────────────────────────────────────────
bind c   new-window -c "#{pane_current_path}"
bind n   next-window
bind p   previous-window
bind -r "<" swap-window -d -t -1       # move window left
bind -r ">" swap-window -d -t +1       # move window right
bind 1   select-window -t :1
bind 2   select-window -t :2
bind 3   select-window -t :3
bind 4   select-window -t :4
bind 5   select-window -t :5
bind 6   select-window -t :6
bind 7   select-window -t :7
bind 8   select-window -t :8
bind 9   select-window -t :9
bind ,   command-prompt -I "#W" "rename-window -- '%%'"
bind $   command-prompt -I "#S" "rename-session -- '%%'"

# ── Television pickers (all popup-based) ─────────────────────────────
#  s  → sessions   (sesh channel: ^s=cycle sources, ^d=kill, ^x=actions)
#  w  → windows    (enter=switch, ^d=kill, ^n=new, ^x=actions)
#  f  → files      (find + preview, ^x=actions to open in editor)
#  /  → grep       (ripgrep + preview, enter opens at line)
#  g  → git        (log — ^t=remote to switch to branches/diff)
#  b  → last session toggle
unbind t
bind s display-popup -E -w 80% -h 80% 'tv sesh'
bind w run-shell "tmux set-option -g @caller_pane '#{pane_id}'" \; \
  display-popup -E -w 80% -h 80% 'tv tmux-windows'
bind f run-shell "tmux set-option -g @caller_pane '#{pane_id}'" \; \
  display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  'zsh ~/.config/tmux/scripts/tv-files.sh'
bind / run-shell "tmux set-option -g @caller_pane '#{pane_id}'" \; \
  display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  'zsh ~/.config/tmux/scripts/tv-grep.sh'
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" 'tv git-log'
bind u run-shell "tmux set-option -g @caller_pane '#{pane_id}'" \; \
  display-popup -E -w 60% -h 40% \
  'zsh ~/.config/tmux/scripts/tv-urls.sh'
bind b switch-client -l

# ── Copy mode (vi) ───────────────────────────────────────────────────
setw -g mode-keys vi
bind [   copy-mode                     # enter copy mode
bind ]   paste-buffer                  # paste from buffer
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi /   command-prompt -i -p '/' "send-keys -X search-forward-incremental '%%'"
bind -T copy-mode-vi ?   command-prompt -i -p '?' "send-keys -X search-backward-incremental '%%'"

# ── Quality of life ──────────────────────────────────────────────────
bind r   source-file ~/.config/tmux/tmux.conf \; display " Config reloaded"
bind ?   run-shell "tmux set-option -g @caller_pane '#{pane_id}'" \; \
  display-popup -E -w 60% -h 60% 'zsh ~/.config/tmux/scripts/cheatsheet.sh'
bind C-l send-keys 'C-l'              # clear screen (l = pane nav)
bind F   display-popup -E -w 80% -h 80% -d "#{pane_current_path}" ""  # floating shell
bind z   resize-pane -Z               # zoom toggle (also default)
bind d   detach-client                 # detach
bind x   kill-pane                     # kill pane (no confirm — faster)
bind X   kill-window                   # kill window

# ── Theme: Catppuccin Mocha ──────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text "  #W"
set -g @catppuccin_window_current_text "  #W"
set -g @catppuccin_date_time_text " %H:%M"

# ── Plugins ──────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'

# Load catppuccin explicitly (cloned as catppuccin-tmux)
run ~/.tmux/plugins/catppuccin-tmux/catppuccin.tmux

run '~/.tmux/plugins/tpm/tpm'

# Must come AFTER tmux-sensible (which forces escape-time 0 on macOS)
set -sg escape-time 15              # 15ms: lets M-Space work, still instant for vim

# ── Status bar (after catppuccin loads its format strings) ────────────
set  -g status-style 'bg=default'   # transparent bg for status bar
set  -g status-right-length 100
set  -g status-left-length 100
set  -g status 2                    # two status lines: content + empty spacer
set  -g status-left "#{E:@catppuccin_status_session}"
set  -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set  -g status-format[1] '#[fill=default]' # empty second line = padding, match terminal bg

# ── Visual polish (after catppuccin) ──────────────────────────────────
# Pane borders — subtle, accent on active
set  -g pane-border-style 'fg=#45475a'           # surface1 (subtle)
set  -g pane-active-border-style 'fg=#89b4fa'    # blue accent
set  -g pane-border-lines single

# Popup styling
set  -g popup-style 'bg=default'
set  -g popup-border-style 'fg=#89b4fa'          # match active pane border
set  -g popup-border-lines rounded

# Messages & command prompt
set  -g message-style 'bg=default,fg=#cdd6f4'    # text color, transparent bg
set  -g mode-style 'bg=#45475a,fg=#cdd6f4'       # selection highlight in copy mode

# Pane number overlay (prefix+q)
set  -g display-panes-colour '#45475a'
set  -g display-panes-active-colour '#89b4fa'


