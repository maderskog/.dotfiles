# -----------------------------------------------------------------------------
# Transparent skin
# Preserve your terminal session background color
# -----------------------------------------------------------------------------

k9s:
  body:
    bgColor: default
  prompt:
    bgColor: default
  info:
    sectionColor: default
  dialog:
    bgColor: default
    labelFgColor: default
    fieldFgColor: default
  frame:
    crumbs:
      fgColor: "#1e1e2e"
      bgColor: "#89b4fa"
      activeColor: "#fab387"
    title:
      bgColor: default
      counterColor: default
    menu:
      fgColor: default
  views:
    charts:
      bgColor: default
    table:
      bgColor: default
      header:
        fgColor: default
        bgColor: default
    xray:
      bgColor: default
    logs:
      bgColor: default
      indicator:
        bgColor: default
        toggleOnColor: default
        toggleOffColor: default
    yaml:
      colonColor: default
      valueColor: default
