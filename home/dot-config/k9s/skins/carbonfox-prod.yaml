# -----------------------------------------------------------------------------
# Carbonfox Prod skin
# Transparent background with red danger accents to signal production
# -----------------------------------------------------------------------------

k9s:
  body:
    bgColor: default
    logoColor: "#ff4444"
  prompt:
    bgColor: default
  info:
    fgColor: orange
    sectionColor: "#ff4444"
  dialog:
    bgColor: default
    labelFgColor: default
    fieldFgColor: default
  frame:
    border:
      fgColor: "#ff4444"
      focusColor: "#ff6666"
