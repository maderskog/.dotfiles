[metadata]
name = "tmux-cheatsheet"
description = "Interactive tmux keybinding reference"

[source]
command = [
  '''python3 -c "
import tomllib, sys
with open(sys.argv[1], 'rb') as f:
    data = tomllib.load(f)
for e in data['entries']:
    d = f\"{e['icon']:<2}  {e['desc']:<33}  \u21e7Spc {e['key']}\"
    print(f\"{d}\t{e['action']}\")
" ~/.config/television/cable/tmux-cheatsheet.toml''',
  '''python3 -c "
import tomllib, sys
with open(sys.argv[1], 'rb') as f:
    data = tomllib.load(f)
for e in data.get('info_entries', []):
    d = f\"{e['icon']:<2}  {e['desc']:<33}  {e['key']}\"
    print(f\"{d}\t\")
" ~/.config/television/cable/tmux-cheatsheet.toml''',
]
display = "{split:\t:0}"
output  = "{split:\t:1}"

[ui]
preview_panel = { hidden = true }

# ── Prefix bindings ─────────────────────────────────────────────────
[[entries]]
icon   = "◉"
desc   = "Sessions (sesh + zoxide)"
key    = "s"
action = "sessions"

[[entries]]
icon   = ""
desc   = "Windows (switch/new/kill)"
key    = "w"
action = "windows"

[[entries]]
icon   = "≡"
desc   = "Files → open in nvim"
key    = "f"
action = "files"

[[entries]]
icon   = "⊘"
desc   = "Grep → open at line"
key    = "/"
action = "grep"

[[entries]]
icon   = "◇"
desc   = "Git log / branches"
key    = "g"
action = "git"

[[entries]]
icon   = "⬡"
desc   = "Open URL from pane"
key    = "u"
action = "urls"

[[entries]]
icon   = "⇄"
desc   = "Last session"
key    = "b"
action = "last"

[[entries]]
icon   = "✦"
desc   = "This cheat sheet"
key    = "?"
action = "cheatsheet"

[[entries]]
icon   = "│"
desc   = "Split vertical"
key    = "\\"
action = "vsplit"

[[entries]]
icon   = "─"
