[metadata]
name = "env"
description = "A channel to select from environment variables"

[source]
command = """export -p | while IFS= read -r line; do case "$line" in ("export -T "*) rest=${line#export -T }; name=${rest%% *} ;; ("export "*) rest=${line#export }; while [[ $rest == -* ]]; do rest=${rest#* }; done; case "$rest" in (*=*) name=${rest%%=*} ;; (*) continue ;; esac ;; (*) continue ;; esac; [[ $name == [A-Za-z_][A-Za-z0-9_]* ]] && print -r -- "$name"; done"""
display = "{}"
output = "{}"

[preview]
command = """L=$'\\033[36m'; R=$'\\033[0m'; D=$'\\033[2m'; name='{}'; value=${(P)name}; print -r -- "${L}Variable:${R} $name"; print; if [[ -n $value ]]; then print -r -- "$value"; else print -r -- "${D}(empty)${R}"; fi; print; chars=${#value}; lines=$(print -r -- "$value" | wc -l | tr -d ' '); print -r -- "${L}Chars:${R} $chars"; print -r -- "${L}Lines:${R} $lines"; case "$name" in (*PATH*|*path*) print; print -r -- "${L}Entries:${R}"; if [[ -n $value ]]; then i=1; for entry in ${(s/:/)value}; do print -r -- "[$i] $entry"; ((i++)); done; else print -r -- "${D}(none)${R}"; fi ;; esac"""

[ui]
preview_panel = { header = "{}" }

[keybindings]
shortcut = "f3"

[actions.name]
description = "Output the variable name instead of the value"
command = "echo '{}'"
mode = "execute"
