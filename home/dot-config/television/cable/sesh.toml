[metadata]
name = "sesh"
description = "Session manager (tmux sessions, zoxide dirs, sesh.toml) — requires https://github.com/joshmedeski/sesh"
requirements = ["sesh"]

[source]
command = [
  """bash -c 'out=$(sesh list -t --icons 2>/dev/null); [[ -n "$out" ]] && printf "%s\\n" "$out" || echo "∅  (no tmux sessions — sesh list empty)"'""",
  """bash -c 'out=$(sesh list -z --icons 2>/dev/null); [[ -n "$out" ]] && printf "%s\\n" "$out" || echo "∅  (no zoxide paths — sesh list empty)"'""",
  """bash -c 'out=$(sesh list -c --icons 2>/dev/null); [[ -n "$out" ]] && printf "%s\\n" "$out" || echo "∅  (no configured sessions — sesh list empty)"'""",
]
ansi = true
output = "{strip_ansi|split: :1..|join: }"

[preview]
command = "bash -c 'line=\"{strip_ansi|split: :1..|join: }\"; if [[ \"$line\" == ∅* ]]; then echo \"Start tmux or configure sesh.\"; else sesh preview \"$line\" 2>/dev/null || echo \"(sesh preview failed)\"; fi'"

[keybindings]
enter = "actions:connect"
ctrl-n = "actions:new_session_here"
ctrl-d = [ "actions:kill_session", "reload_source" ]

[actions.connect]
description = "Connect to selected session"
command = "bash -c 'line=\"{strip_ansi|split: :1..|join: }\"; [[ \"$line\" != ∅* ]] && sesh connect \"$line\"'"
mode = "execute"

[actions.new_session_here]
description = "New session in current directory"
command = "sesh connect \"$PWD\""
mode = "execute"

[actions.kill_session]
description = "Kill selected tmux session (press Ctrl+r to reload)"
command = "bash -c 'line=\"{strip_ansi|split: :1..|join: }\"; [[ \"$line\" != ∅* ]] && tmux kill-session -t \"$line\"'"
mode = "fork"
