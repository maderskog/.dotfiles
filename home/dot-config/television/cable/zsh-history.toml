[metadata]
name = "zsh-history"
description = "A channel to select from your zsh history"
requirements = ["zsh"]

[source]
command = "sed '1!G;h;$!d' ${HISTFILE:-${HOME}/.zsh_history} | awk '{ separator = index($0, \";\"); command = separator ? substr($0, separator + 1) : $0; if (!seen[command]++) print }'"
display = "{split:;:1..}"
output = "{split:;:1..}"
no_sort = true
frecency = false

[actions.execute]
description = "Execute the selected command"
command = "zsh -c '{split:;:1..}'"
mode = "execute"
