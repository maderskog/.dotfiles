[metadata]
name = "files"
description = '''Browse files.

Source order
1. current directory (hidden files included, .gitignore respected)
2. home directory (cached, refreshes in background as you browse)

Press `ctrl-s` to cycle sources.
'''
requirements = ["fd", "bat"]

[source]
command = [
  "fd -H -t f -E .git -E node_modules -E __pycache__ 2>/dev/null",
  "bash ${XDG_CONFIG_HOME:-$HOME/.config}/television/scripts/home_files.sh",
]

[preview]
command = "bash ${XDG_CONFIG_HOME:-$HOME/.config}/television/scripts/preview_file.sh '{}'"

[keybindings]
shortcut = "f1"
enter = "actions:select_for_pane"
f12 = "actions:edit"

[actions.select_for_pane]
description = "Select file (for tmux pane opener)"
command = "printf '%s' '{}' > /tmp/tv-selected"
shell = "bash"
mode = "execute"

[actions.edit]
description = "Open in editor"
command = "${EDITOR:-nvim} '{}'"
shell = "bash"
mode = "execute"
