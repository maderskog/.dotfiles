[metadata]
name = "ssh-hosts"
description = "Select hosts from your SSH config"
requirements = ["bash"]

[source]
command = "bash -c 'h=$(grep -hE \"^Host(name)? \" \"$HOME/.ssh/config\" 2>/dev/null | tr -s \" \" | cut -d\" \" -f2- | tr \" \" \"\\n\" | grep -v \"^$\" | grep -v \"^\\*$\"); if [[ -z \"$h\" ]]; then echo \"(no Host entries in ~/.ssh/config)\"; else printf \"%s\\n\" \"$h\"; fi'"

[preview]
command = "bash -c 'case $1 in \"(no Host\"*) echo \"Add Host entries to ~/.ssh/config\";; *) ssh -G \"$1\" 2>/dev/null | head -50;; esac' _ '{}'"

[keybindings]
enter = "actions:connect"

[actions.connect]
description = "SSH into the selected host"
command = "bash -c 'case $1 in \"(no Host\"*) exit 0;; *) exec ssh \"$1\";; esac' _ '{}'"
mode = "execute"
