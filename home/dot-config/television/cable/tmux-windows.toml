[metadata]
name = "tmux-windows"
description = "List and manage tmux windows"
requirements = ["tmux"]

[source]
command = [
  "zsh ~/.config/tmux/scripts/list-windows.sh",
  "zsh ~/.config/tmux/scripts/list-windows.sh -a"
]
display = "{split:\t:0} {split:\t:1}  {split:\t:2} ({split:\t:3})  {split:\t:4}"
output = "{split:\t:1}"

[preview]
command = "tmux capture-pane -t '{split:\t:1}' -p 2>/dev/null || echo 'No preview available'"

[keybindings]
enter = "actions:switch"
ctrl-n = ["actions:new", "reload_source"]
ctrl-d = ["actions:kill", "reload_source"]

[actions.switch]
description = "Switch to window"
command = "tmux switch-client -t '{split:\t:1}'"
mode = "execute"

[actions.new]
description = "New window in session"
command = "tmux new-window -t \"$(echo '{split:\t:1}' | cut -d: -f1):\""
shell = "bash"
mode = "fork"

[actions.kill]
description = "Kill window"
command = "tmux kill-window -t '{split:\t:1}'"
mode = "fork"
