[metadata]
name = "make-targets"
description = "List and run Makefile targets"
requirements = ["make"]

[source]
command = "make -pRrq 2>/dev/null | awk -F: '/^[a-zA-Z0-9][^$#\\/\\t=]*:([^=]|$)/ {split($1,a,\" \"); print a[1]}' | sort -u | grep -v '^Makefile$'"

[preview]
command = """bash -c 't="{}"; for f in Makefile makefile GNUmakefile; do if [[ -f "$f" ]]; then make -Bn -f "$f" -- "$t" 2>&1 | head -50; exit 0; fi; done; echo "No Makefile, makefile, or GNUmakefile in $PWD."'"""

[keybindings]
enter = "actions:run"

[actions.run]
description = "Run the selected make target"
command = "bash -c 'for f in Makefile makefile GNUmakefile; do [[ -f \"$f\" ]] && exec make -f \"$f\" -- \"$1\"; done' _ '{}'"
mode = "execute"
