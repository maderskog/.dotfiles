[metadata]
name = "alias"
description = '''Pick zsh aliases by name.

Sources (ctrl-s): command aliases · globals · suffix handlers.

List shows the name only; preview shows the expansion and searches ~/.zshrc, ~/.config/zsh, and ~/.local/share/zinit for the defining line (ripgrep if available, else grep).'''
requirements = ["zsh"]

[source]
command = [
  "zsh ${XDG_CONFIG_HOME:-$HOME/.config}/television/scripts/list_aliases.zsh regular",
  "zsh ${XDG_CONFIG_HOME:-$HOME/.config}/television/scripts/list_aliases.zsh global",
  "zsh ${XDG_CONFIG_HOME:-$HOME/.config}/television/scripts/list_aliases.zsh suffix",
]
display = "{split:\t:1}"
output = "{split:\t:1}"
frecency = false

[preview]
command = "zsh ${XDG_CONFIG_HOME:-$HOME/.config}/television/scripts/alias_preview.sh '{}'"

[ui]
preview_panel = { header = "{split:\t:1} [{split:\t:0}]" }
