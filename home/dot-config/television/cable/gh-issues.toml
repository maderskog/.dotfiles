[metadata]
name = "gh-issues"
description = "List GitHub issues for the current repo"
requirements = ["gh", "jq"]

[source]
command = '''bash -c 'gh issue list --state open --limit 100 --json number,title,createdAt,author,labels 2>/dev/null | jq -r "
  if type != \"array\" then
    \"0\\t\\u001b[31m(gh error — run gh auth login or use a git repo)\\u001b[39m\"
  elif length == 0 then
    \"0\\t\\u001b[90m(no open issues)\\u001b[39m\"
  else
    .[] | \"\\(.number)\\t  \\u001b[32m#\\(.number)\\u001b[39m   \\(.title)  \\u001b[33m@\\(.author.login)\\u001b[39m\" + (if (.labels | length) > 0 then \" \" + ([.labels[] | \"\\u001b[35m\" + .name + \"\\u001b[39m\"] | join(\" \")) else \"\" end)
  end
"' '''
ansi = true
display = "{split:\t:1}"
output = "{split:\t:0}"

[ui]
preview_panel = { header = "{split:\t:0}" }

[preview]
command = '''bash -c 'n="{split:\t:0}"; if [[ "$n" == "0" ]]; then echo "No issue to show (empty list, or fix gh / repo)."; else gh issue view "$n" --json number,title,body,state,author,createdAt,updatedAt,labels,assignees | jq -r "
  \"  \" + .title,
  \"  #\" + (.number | tostring),
  \"\",
  \"  \\u001b[36mStatus:\\u001b[39m \\u001b[32m\" + .state + \"\\u001b[39m\",
  \"  \\u001b[36mAuthor:\\u001b[39m \\u001b[33m\" + .author.login + \"\\u001b[39m\",
  \"  \\u001b[36mCreated:\\u001b[39m \" + (.createdAt | fromdateiso8601 | (now - .) | if . < 3600 then (./60|floor|tostring) + \" minutes ago\" elif . < 86400 then (./3600|floor|tostring) + \" hours ago\" else (./86400|floor|tostring) + \" days ago\" end),
  \"  \\u001b[36mUpdated:\\u001b[39m \" + (.updatedAt | fromdateiso8601 | (now - .) | if . < 3600 then (./60|floor|tostring) + \" minutes ago\" elif . < 86400 then (./3600|floor|tostring) + \" hours ago\" else (./86400|floor|tostring) + \" days ago\" end),
  (if (.labels | length) > 0 then \"  \\u001b[36mLabels:\\u001b[39m \" + ([.labels[] | \"\\u001b[35m\" + .name + \"\\u001b[39m\"] | join(\" \")) else \"\" end),
  (if (.assignees | length) > 0 then \"  \\u001b[36mAssignees:\\u001b[39m \" + ([.assignees[].login] | join(\", \")) else \"\" end),
  \"\",
  \"  \\u001b[90m────────────────────────────────────────────────────────────\\u001b[39m\",
  \"\",
  (.body // \"\")
"; fi' '''

[actions.open]
description = "Open the issue in the browser"
command = "bash -c 'n=\"{split:\t:0}\"; [[ \"$n\" != \"0\" ]] && gh issue view \"$n\" --web'"
mode = "fork"

[actions.close]
description = "Close the selected issue"
command = "bash -c 'n=\"{split:\t:0}\"; [[ \"$n\" != \"0\" ]] && gh issue close \"$n\"'"
mode = "fork"

[actions.comment]
description = "Add a comment to the selected issue"
command = "bash -c 'n=\"{split:\t:0}\"; [[ \"$n\" != \"0\" ]] && gh issue comment \"$n\"'"
mode = "execute"
