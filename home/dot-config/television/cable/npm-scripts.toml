[metadata]
name = "npm-scripts"
description = "List and run npm scripts from package.json"
requirements = ["jq"]

[source]
command = "bash -c 'if [[ -f package.json ]]; then jq -r \".scripts | to_entries[] | \\\"\\\\(.key)\\\\t\\\\(.value)\\\"\" package.json; else printf \"_\\t(no package.json in %s)\\n\" \"$PWD\"; fi'"

display = "{split:\t:0}"

[preview]
command = "bash -c \"if [[ \\\"\\$1\\\" == \\\"_\\\" ]]; then echo \\\"Open from a Node project root.\\\"; else jq -r --arg k \\\"\\$1\\\" '.scripts[\\$k] // empty' package.json; fi\" _ '{split:\t:0}'"

[keybindings]
enter = "actions:run"

[actions.run]
description = "Run the selected npm script"
command = "bash -c \"case \\$1 in _) exit 0;; *) exec npm run -- \\\"\\$1\\\";; esac\" _ '{split:\t:0}'"
mode = "execute"
