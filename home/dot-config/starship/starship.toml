# ------------------------------------------------------------------------------
# GLOBAL SETTINGS
# ------------------------------------------------------------------------------
add_newline = false
command_timeout = 1000
palette = "carbonfox_vibrant"

format = """
$directory\
$character\
"""

right_format = """
$status\
$git_branch\
$git_commit\
$git_state\
$git_status\
$elixir\
$python\
$nodejs\
$package\
$aws\
$kubernetes\
"""

# ------------------------------------------------------------------------------
# PROFILES (Used by Zsh hook for history)
# ------------------------------------------------------------------------------
[profiles]
transient = "[$directory](56749c) [\uf054](1a854a) "

# ------------------------------------------------------------------------------
# SYMBOLS & CHARACTERS
# ------------------------------------------------------------------------------

[character]
success_symbol = "[\uf054](bold green)"
error_symbol = "[\uf054](bold red)"
vicmd_symbol = "[\ue7c5](bold yellow)"

[directory]
style = "bold blue"
truncation_length = 2
truncation_symbol = "…/"

# ------------------------------------------------------------------------------
# RIGHT SIDE MODULES
# ------------------------------------------------------------------------------

[status]
disabled = false
symbol = "\U000F02A0 "
format = "[$symbol](blink red)[$status](bold red) "

# --- GIT ---

[git_branch]
symbol = "\uf418 "
format = '[$symbol$branch](git_branch) '

[git_status]
# Layout: [Changes] [Octocat] [Ahead/Behind]
# Uses Double Quotes "" to fix the escape character bug
format = "([$conflicted$modified$staged$renamed$deleted$untracked$stashed]($style) [\ueba1](git_remote) [$ahead_behind]($style) )"
style = "git_remote"

conflicted = "[ \ue727 ](bold red)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${count}⇣${count}"
up_to_date = ""

# Status Counts with Gradient Colors
modified = "[ \uf044 ${count}](git_modified)" # Step 2
staged   = "[ \uf046 ${count}](git_staged)"   # Step 3
renamed  = "[ »${count}](git_staged)"        # Step 3
stashed  = "[ \uf51e ${count}](git_stash)"    # Step 4
untracked = "[ ?${count}](git_stash)"        # Step 4
deleted  = "[ ✘${count}](bold red)"

# --- LANGUAGES ---

[elixir]
symbol = "\ue62d "
style = "elixir_purple"
format = '[$symbol($version )]($style)'

[python]
symbol = "\ue73c "
format = '[${symbol}${version}](python_1) [${virtualenv}](python_2) '

[nodejs]
symbol = "\ue718 "
style = "blue"
format = '[$symbol($version )]($style)'

[package]
symbol = "\uf487 "
style = "python_3"
format = '[$symbol$version]($style) '

# --- CLOUD ---

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = "\ue7ad "

[kubernetes]
symbol = "\u2388 "
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '

# ------------------------------------------------------------------------------
# PALETTE (Vibrant High Contrast)
# ------------------------------------------------------------------------------

[palettes.carbonfox_vibrant]
base = "#161616"
bg = "#161616"
text = "#f2f4f8"
white = "#dfdfe0"
blue = "#78a9ff"
cyan = "#3ddbd9"
green = "#25be6a"
red = "#e94560"

# Custom
elixir_purple = "#a674ff"

# Python Gradient (Yellows)
python_1 = "#ffff00" # Max
python_2 = "#ffd700" # Gold
python_3 = "#ffaa00" # Amber

# Git Gradient (Magentas)
git_branch   = "#ff40ff" # Max
git_remote   = "#e639e6" # Step 1 (Origin/Remote)
git_modified = "#cc33cc" # Step 2 (Modified)
git_staged   = "#b32cb3" # Step 3 (Staged)
git_stash    = "#992699" # Step 4 (Stash)
