# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 4
final_space: true

palette:
  Blue: "#78a9ff"
  Green: "#25be6a"
  Red: "#e94560"
  MutedBlue: "#56749c"
  MutedGreen: "#1a854a"
  MutedRed: "#942d3d"
  Git1: "#ff40ff"
  Git2: "#e639e6"
  Git3: "#cc33cc"
  Git4: "#b32cb3"
  Git5: "#992699"
  Py1: "#ffff00"
  Py2: "#ffd700"
  Py3: "#ffaa00"
  Elixir: "#a674ff"

var:
  Spacer: "\u00a0"
  Arrow: "\uf054"
  ErrorGhost: "\U000F02A0"
  Truncation: "\u22ef"
  GitBranch: "\uf418"
  GitTag: "\uf02b"
  GitWarning: "\u26a0"
  GitAhead: "\u21e1"
  GitBehind: "\u21e3"
  GitModified: "\uf044"
  GitDeleted: "\u2718"
  GitUntracked: "?"
  GitStaged: "\uf046"
  GitStash: "\uf51e"
  ElixirIcon: "\ue62d"
  PythonIcon: "\ue73c"
  PackageIcon: "\uf487"
  NodeIcon: "\ue718"
  NpmIcon: "\ue71e"
  AWSIcon: "\ue7ad"

console_title_template: "{{ .PWD }} | {{ .Shell }}"

transient_prompt:
  template: "<p:MutedBlue>{{ .PWD }}</> {{ if eq .Code 0 }}<p:MutedGreen>{{ .Var.Arrow }}</>{{ else }}<p:MutedRed>{{ .Var.Arrow }}</>{{ end }} "

secondary_prompt:
  template: "<p:MutedBlue> > </>"
  foreground: "p:MutedBlue"
  background: "transparent"

blocks:
  - type: prompt
    alignment: left
    segments:
      - foreground: "p:Blue"
        type: path
        style: plain
        options:
          style: agnoster_short
          max_depth: 3
          hide_root_location: true
          folder_icon: "{{ .Var.Truncation }}"

      - template: " {{ if eq .Code 0 }}<p:Green>{{ .Var.Arrow }}</>{{ else }}<p:Red>{{ .Var.Arrow }}</>{{ end }}"
        type: text
        style: plain

  - type: rprompt
    alignment: right
    segments:
      - template: " {{ if ne .Code 0 }}<f><p:Red>{{ .Var.ErrorGhost }}</></f> <p:Red>{{ reason .Code }}</>{{ end }}"
        type: status
        style: plain

      - template: " <p:Git1>{{ .Var.GitBranch }} {{ .HEAD }}</>{{ if gt .Working.Modified 0 }}<p:Git3> {{ .Var.GitModified }} {{ .Working.Modified }}</>{{ end }}{{ if gt .Working.Deleted 0 }}<p:Git3> {{ .Var.GitDeleted }} {{ .Working.Deleted }}</>{{ end }}{{ if gt .Working.Untracked 0 }}<p:Git3> {{ .Var.GitUntracked }}{{ .Working.Untracked }}</>{{ end }}{{ if gt .Staging.Modified 0 }}<p:Git4> {{ .Var.GitStaged }} {{ .Staging.Modified }}</>{{ end }}{{ if gt .Staging.Deleted 0 }}<p:Git4> {{ .Var.GitStaged }}{{ .Var.GitDeleted }} {{ .Staging.Deleted }}</>{{ end }}{{ if gt .StashCount 0 }}<p:Git5> {{ .Var.GitStash }} {{ .StashCount }}</>{{ end }} <p:Git2>{{ .UpstreamIcon }}</>{{ if .BranchStatus }} <p:Git2>{{ .BranchStatus }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true
          fetch_stash_count: true
          fetch_upstream_icon: true

      - template: " <p:Elixir>{{ .Var.ElixirIcon }} {{ .Full }}</>"
        type: elixir
        style: plain

      - template: " {{ if .Error }}{{ .Error }}{{ else }}<p:Py1>{{ .Var.PythonIcon }} {{ .Major }}.{{ .Minor }}</>{{ if .Venv }} <p:Py2>{{ .Venv }}</>{{ end }}{{ end }}"
        type: python
        style: plain

      - template: " {{if .Version}}<p:Py3>{{ .Var.PackageIcon }} {{.Version}}</>{{end}}"
        type: project
        style: plain

      - template: " <p:Blue>{{ .Var.NodeIcon }} {{ .Full }}</>"
        type: node
        style: plain

      - template: " <p:Blue>{{ .Var.NpmIcon }} {{ .Full }}</>"
        type: npm
        style: plain

      - template: " <p:Blue>{{ .Var.AWSIcon }} {{.Profile}}{{if .Region}} ({{.Region}}){{end}}</>"
        type: aws
        style: plain

      - template: "{{ .Var.Spacer }}"
        type: text
        style: plain
