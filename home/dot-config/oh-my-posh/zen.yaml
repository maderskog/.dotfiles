# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 4
final_space: true

palette:
  Blue: "#78a9ff"
  Green: "#25be6a"
  Red: "#e94560"
  Time: "#e09142"
  MutedBlue: "#56749c"
  MutedGreen: "#1a854a"
  MutedRed: "#942d3d"
  Git1: "#ff40ff"
  Git2: "#e639e6"
  Git3: "#cc33cc"
  Git4: "#b32cb3"
  Git5: "#992699"
  Py1: "#ffff00"
  Py2: "#ffd700"
  Py3: "#ffaa00"
  Elixir: "#a674ff"

var:
  Spacer: "\u00a0"
  Arrow: "\uf054"
  Truncation: "\u22ef"
  Error: "\U000F02A0"
  Warning: "\u26a0"
  Execution: "\uf252"
  Branch: "\uf418"
  Tag: "\uf02b"
  GitAhead: "\u21e1"
  GitBehind: "\u21e3"
  GitModified: "\uf044"
  GitDeleted: "\u2718"
  GitUntracked: "?"
  GitStaged: "\uf046"
  GitStash: "\uf51e"
  Elixir: "\ue62d"
  Python: "\ue73c"
  Package: "\uf487"
  Node: "\ue718"
  Npm: "\ue71e"
  AWSIcon: "\ue7ad"

console_title_template: "{{ .PWD }} | {{ .Shell }}"

transient_prompt:
  template: "<p:MutedBlue>{{ .PWD }}</> {{ if eq .Code 0 }}<p:MutedGreen>{{ .Var.Arrow }}</>{{ else }}<p:MutedRed>{{ .Var.Arrow }}</>{{ end }} "

secondary_prompt:
  template: "<p:MutedBlue> > </>"
  foreground: "p:MutedBlue"
  background: "transparent"

blocks:
  - type: prompt
    alignment: left
    segments:
      - foreground: "p:Blue"
        type: path
        style: plain
        options:
          style: agnoster_short
          max_depth: 3
          hide_root_location: true
          folder_icon: "{{ .Var.Truncation }}"

      - template: "{{ if eq .Code 0 }}<p:Green>{{ .Var.Arrow }}</>{{ else }}<p:Red>{{ .Var.Arrow }}</>{{ end }}"
        type: text
        style: plain

  - type: rprompt
    alignment: right
    segments:
      - template: "{{ if ne .Code 0 }}<f><p:Red>{{ .Var.Error }}</></f> <p:Red>{{ reason .Code }}</>{{ end }}"
        type: status
        style: plain

      - template: " <p:Time>{{ .Var.Execution }} {{ .FormattedMs }}</>"
        type: executiontime
        style: plain
        options:
          threshold: 1000
          style: "austin"

      - template: " <p:Git1>{{ .Var.Branch }} {{ .HEAD }}</>"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .Working.Modified 0 }} <p:Git3>{{ .Var.GitModified }}{{ .Working.Modified }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .Working.Deleted 0 }} <p:Git3>{{ .Var.GitDeleted }}{{ .Working.Deleted }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .Working.Untracked 0 }} <p:Git3>{{ .Var.GitUntracked }}{{ .Working.Untracked }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .Staging.Modified 0 }} <p:Git4>{{ .Var.GitStaged }}{{ .Staging.Modified }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .Staging.Deleted 0 }} <p:Git4>{{ .Var.GitStaged }}{{ .Var.GitDeleted }} {{ .Staging.Deleted }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .StashCount 0 }} <p:Git5>{{ .Var.GitStash }}{{ .StashCount }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_stash_count: true

      - template: "{{ if .UpstreamIcon }} <p:Git2>{{ .UpstreamIcon }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_upstream_icon: true

      - template: "{{ if gt .Ahead 0 }} <p:Git2>{{ .Var.GitAhead }}{{ .Ahead }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: "{{ if gt .Behind 0 }} <p:Git3>{{ .Var.GitBehind }}{{ .Behind }}</>{{ end }}"
        type: git
        style: plain
        options:
          fetch_status: true

      - template: " <p:Elixir>{{ .Var.Elixir }} {{ .Full }}</>"
        type: elixir
        style: plain

      - template: " {{ if .Error }}<p:Red>{{ .Var.Warning }} {{ .Error }}</>{{ else }}<p:Py1>{{ .Var.Python }} {{ .Major }}.{{ .Minor }}</>{{ end }}"
        type: python
        style: plain

      - template: "{{ if .Venv }} <p:Py2>{{ .Venv }}</>{{ end }}"
        type: python
        style: plain

      - template: " {{if .Version}}<p:Py3>{{ .Var.Package }} {{.Version}}</>{{end}}"
        type: project
        style: plain

      - template: " <p:Blue>{{ .Var.Node }} {{ .Full }}</>"
        type: node
        style: plain

      - template: " <p:Blue>{{ .Var.Npm }} {{ .Full }}</>"
        type: npm
        style: plain

      - template: " <p:Blue>{{ .Var.AWS }} {{.Profile}}{{if .Region}} ({{.Region}}){{end}}</>"
        type: aws
        style: plain

      - template: "{{ .Var.Spacer }}"
        type: text
        style: plain
