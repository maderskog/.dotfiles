# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 4
final_space: true

# ------------------------------------------------------------------------------
# GLOBAL SETTINGS
# ------------------------------------------------------------------------------
console_title_template: "{{ .PWD }} | {{ .Shell }}"

# ------------------------------------------------------------------------------
# TRANSIENT PROMPT
# ------------------------------------------------------------------------------
transient_prompt:
  # Path: No leading space (Start of line)
  # Arrow: Leading space " \uf054"
  template: "<#56749c>{{ .PWD }}</> {{ if eq .Code 0 }}<#1a854a>\uf054</>{{ else }}<#942d3d>\uf054</>{{ end }} "

# ------------------------------------------------------------------------------
# SECONDARY PROMPT
# ------------------------------------------------------------------------------
secondary_prompt:
  template: "<#56749c> > </>"
  foreground: "#56749c"
  background: "transparent"

# ------------------------------------------------------------------------------
# BLOCKS
# ------------------------------------------------------------------------------
blocks:
  - type: prompt
    alignment: left
    segments:
      # 1. PATH (Start of line, NO leading space)
      - foreground: "#78a9ff"
        type: path
        style: plain
        properties:
          style: full
          truncation_length: 2
          truncation_symbol: ".../"

      # 2. ARROW (Strict: Leading Space)
      - template: " {{ if eq .Code 0 }}<#25be6a>\uf054</>{{ else }}<#e94560>\uf054</>{{ end }}"
        type: text
        style: plain

  - type: rprompt
    alignment: right
    segments:
      # 1. ERROR (Strict: Leading Space)
      - template: " {{ if ne .Code 0 }}<f><#e94560>\U000F02A0</></f> <#e94560>{{ reason .Code }}</>{{ end }}"
        type: status
        style: plain

      # 2. GIT (Strict: Every sub-block has a Leading Space)
      # Branch: " \uf418 Name"
      # Status: " \uIcon Count"
      # Origin: " \uIcon"
      # Sync:   " Text"
      - template: " <#ff40ff>\uf418 {{ .HEAD }}</>{{ if gt .Working.Modified 0 }}<#cc33cc> \uf044 {{ .Working.Modified }}</>{{ end }}{{ if gt .Working.Deleted 0 }}<#cc33cc> \u2718 {{ .Working.Deleted }}</>{{ end }}{{ if gt .Working.Untracked 0 }}<#cc33cc> ?{{ .Working.Untracked }}</>{{ end }}{{ if gt .Staging.Modified 0 }}<#b32cb3> \uf046 {{ .Staging.Modified }}</>{{ end }}{{ if gt .Staging.Deleted 0 }}<#b32cb3> \uf046\u2718 {{ .Staging.Deleted }}</>{{ end }}{{ if gt .StashCount 0 }}<#992699> \uf51e {{ .StashCount }}</>{{ end }} <#e639e6>{{ .UpstreamIcon }}</>{{ if .BranchStatus }} <#e639e6>{{ .BranchStatus }}</>{{ end }}"
        type: git
        style: plain
        properties:
          fetch_status: true
          fetch_stash_count: true
          fetch_upstream_icon: true

      # 3. LANGUAGES (Strict: Leading Space for all)

      # Elixir
      - template: " <#a674ff>\ue62d {{ .Full }}</>"
        type: elixir
        style: plain

      # Python
      - template: " {{ if .Error }}{{ .Error }}{{ else }}<#ffff00>\ue73c {{ .Major }}.{{ .Minor }}</>{{ if .Venv }} <#ffd700>{{ .Venv }}</>{{ end }}{{ end }}"
        type: python
        style: plain

      # Project Version
      - template: " {{if .Version}}<#00f900>\uf487 {{.Version}}</>{{end}}"
        type: project
        style: plain

      # Node
      - template: " <#78a9ff>\ue718 {{ .Full }}</>"
        type: node
        style: plain
      # NPM
      - template: " <#78a9ff>\ue71e {{.Full}}</>"
        type: npm
        style: plain

      # 4. CLOUD (Strict: Leading Space)
      - template: " <#78a9ff>\ue7ad {{.Profile}}{{if .Region}} ({{.Region}}){{end}}</>"
        type: aws
        style: plain

      # 5. SPACER (Final padding for right edge)
      - template: "<b> </b>"
        type: text
        style: plain
